<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>Keto Drop Defense</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="title">Keto Drop Defense</div>
      <div class="subtitle">Tippe “bad carbs” weg. Lass Keto durch 🥦</div>
    </div>

    <div class="hud">
      <div class="pill">
        <div class="label">Score</div>
        <div id="score" class="value">0</div>
      </div>
      <div class="pill">
        <div class="label">Ziel</div>
        <div class="value">+100 / -100</div>
      </div>
      <button id="btnRestart" class="btn">Neustart</button>
    </div>
  </header>

  <main class="stage-wrap">
    <div class="stage">
      <canvas id="game" width="420" height="760" aria-label="Spielbereich"></canvas>

      <div class="avatarCard" aria-label="Avatar">
        <div class="avatarTitle">Du</div>
        <div class="avatarRow">
          <svg id="avatar" viewBox="0 0 220 220" role="img" aria-label="Mensch-Avatar">
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.25"/>
                <stop offset="100%" stop-color="#22c55e" stop-opacity="0.2"/>
              </linearGradient>
            </defs>
            <circle cx="110" cy="110" r="100" fill="url(#g)" />

            <circle cx="110" cy="72" r="22" fill="#eab308" opacity="0.9"/>

            <g id="body" transform="translate(0,0)">
              <rect x="70" y="95" width="80" height="82" rx="22" fill="#94a3b8" opacity="0.95"/>
              <rect id="armL" x="42" y="103" width="34" height="62" rx="18" fill="#94a3b8" opacity="0.95"/>
              <rect id="armR" x="144" y="103" width="34" height="62" rx="18" fill="#94a3b8" opacity="0.95"/>
              <rect x="82" y="170" width="22" height="40" rx="10" fill="#64748b" opacity="0.95"/>
              <rect x="116" y="170" width="22" height="40" rx="10" fill="#64748b" opacity="0.95"/>
            </g>
          </svg>

          <div class="avatarStats">
            <div class="stat">
              <div class="label">Form</div>
              <div id="formLabel" class="value">Durchschnitt</div>
            </div>
            <div class="stat">
              <div class="label">Intensität</div>
              <div id="intensityLabel" class="value">Normal</div>
            </div>
            <div class="hint">
              <span class="kbd">Tap</span> Food = vernichten (0 Punkte).<br/>
              Durchkommen lassen = +/- Punkte je Keto-Tauglichkeit.
            </div>
          </div>
        </div>
      </div>

      <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
        <div class="modal">
          <div id="resultTitle" class="modalTitle">Ergebnis</div>
          <div id="resultText" class="modalText"></div>
          <div class="modalActions">
            <button id="btnPlayAgain" class="btn primary">Nochmal</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div>
      Offline-fähig via Service Worker · Installierbar als PWA
    </div>
    <div id="swStatus" class="muted"></div>
  </footer>

  <script src="./game.js"></script>
  <script>
    const swStatus = document.getElementById("swStatus");
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          await navigator.serviceWorker.register("./sw.js");
          swStatus.textContent = "Offline-Cache aktiv.";
        } catch (e) {
          swStatus.textContent = "Service Worker konnte nicht geladen werden.";
        }
      });
    } else {
      swStatus.textContent = "Service Worker nicht unterstützt.";
    }
  </script>
</body>
</html>
